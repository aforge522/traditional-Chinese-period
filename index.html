<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>晷迹 · 中国风诗意交互</title>
    <style>
        :root {
            /* 中国风意境色定义 */
            --morning-1: #fdeff2; --morning-2: #e0f0f8; /* 曙色 / 月白 (淡粉微紫) */
            --noon-1: #fff799; --noon-2: #ffa400;    /* 赤金 / 明黄 (日头最盛) */
            --evening-1: #f1939c; --evening-2: #b35c44; /* 胭脂 / 赭红 (落日染云) */
            --night-1: #161823; --night-2: #2b333e;   /* 玄黑 / 黛青 (夜静山远) */
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: "STKaiti", "KaiTi", "SimSun", serif;
            transition: background 2s ease;
        }

        #bg-overlay {
            position: absolute; width: 100%; height: 100%;
            z-index: 1; transition: background 2.5s ease;
        }

        /* 顶部信息：时辰 */
        #top-info {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            z-index: 20; text-align: center; pointer-events: none;
        }
        #current-period {
            font-size: 2rem; letter-spacing: 15px; color: rgba(0,0,0,0.5);
            font-weight: bold; transition: color 1s;
        }

        /* 诗词区 */
        #poem-container {
            position: absolute; top: 15%; width: 100%; height: 40%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }

        .poem-wrap {
            text-align: center; opacity: 0; transform: translateY(20px);
            transition: all 1s ease; position: absolute;
        }
        .active { opacity: 1; transform: translateY(0); }

        .title { font-size: 1.4rem; margin-bottom: 15px; opacity: 0.8; letter-spacing: 2px; }
        .content { font-size: 3rem; line-height: 1.6; font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; }
        .author-line { font-size: 1.4rem; letter-spacing: 4px; border-top: 1px solid rgba(0,0,0,0.15); padding-top: 10px; display: inline-block; }
        .author-line::before { content: "—— "; }

        /* 日晷区 */
        #dial-wrap {
            position: absolute; bottom: 8%; width: 100%; height: 40%;
            display: flex; justify-content: center; align-items: center;
            z-index: 5;
        }

        #sundial {
            position: relative; width: 280px; height: 280px;
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid rgba(0, 0, 0, 0.08);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        #shadow {
            position: absolute; top: 50%; left: 50%;
            width: 2px; height: 140px; background: rgba(0,0,0,0.4);
            transform-origin: top center; filter: blur(1.5px);
        }

        #center-dot {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; background: #4a312d;
            border-radius: 50%; transform: translate(-50%, -50%);
        }

        .marker { position: absolute; font-size: 1.1rem; color: rgba(0,0,0,0.3); transform: translate(-50%, -50%); font-weight: bold; }
    </style>
</head>
<body>

<div id="bg-overlay"></div>

<div id="top-info">
    <div id="current-period">正午</div>
</div>

<div id="poem-container">
    <div id="poem-box" class="poem-wrap">
        <div class="title" id="p-title"></div>
        <div class="content" id="p-text"></div>
        <div class="author-line" id="p-author"></div>
    </div>
</div>

<div id="dial-wrap">
    <div id="sundial">
        <div class="marker" style="top:8%; left:50%">午</div>
        <div class="marker" style="top:50%; left:92%">卯</div>
        <div class="marker" style="top:50%; left:8%">酉</div>
        <div class="marker" style="top:92%; left:50%">子</div>
        <div id="shadow"></div>
        <div id="center-dot"></div>
    </div>
</div>

<script>
    const db = {
        morning: {
            bg: "linear-gradient(135deg, var(--morning-1), var(--morning-2))",
            periodName: "清晨 · 破晓",
            poems: [
                {t: "春晓", c: "春眠不觉晓，处处闻啼鸟。", a: "孟浩然"},
                {t: "商山早行", c: "鸡声茅店月，人迹板桥霜。", a: "温庭筠"},
                {t: "次北固山下", c: "海日生残夜，江春入旧年。", a: "王湾"}
            ]
        },
        noon: {
            bg: "linear-gradient(135deg, var(--noon-1), var(--noon-2))",
            periodName: "正午 · 日中",
            poems: [
                {t: "悯农其二", c: "锄禾日当午，汗滴禾下土。", a: "李绅"},
                {t: "夏日田园杂兴", c: "昼出耘田夜绩麻，村庄儿女各当家。", a: "范成大"}
            ]
        },
        evening: {
            bg: "linear-gradient(135deg, var(--evening-1), var(--evening-2))",
            periodName: "黄昏 · 日落",
            poems: [
                {t: "使至塞上", c: "大漠孤烟直，长河落日圆。", a: "王维"},
                {t: "天净沙 · 秋思", c: "夕阳西下，断肠人在天涯。", a: "马致远"},
                {t: "登乐游原", c: "夕阳无限好，只是近黄昏。", a: "李商隐"}
            ]
        },
        night: {
            bg: "linear-gradient(135deg, var(--night-1), var(--night-2))",
            periodName: "深夜 · 幽谧",
            poems: [
                {t: "静夜思", c: "床前明月光，疑是地上霜。", a: "李白"},
                {t: "枫桥夜泊", c: "月落乌啼霜满天，江枫渔火对愁眠。", a: "张继"},
                {t: "春夜喜雨", c: "随风潜入夜，润物细无声。", a: "杜甫"}
            ]
        }
    };

    const bg = document.getElementById('bg-overlay');
    const shadow = document.getElementById('shadow');
    const pBox = document.getElementById('poem-box');
    const periodDisplay = document.getElementById('current-period');
    let currentPeriod = "";

    document.addEventListener('mousemove', (e) => {
        const dial = document.getElementById('sundial').getBoundingClientRect();
        const centerX = dial.left + dial.width / 2;
        const centerY = dial.top + dial.height / 2;

        const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
        let deg = angle * (180 / Math.PI) + 90;
        if (deg < 0) deg += 360;

        shadow.style.transform = `translateX(-50%) rotate(${deg}deg)`;
        
        let period = "";
        if (deg >= 45 && deg < 135) period = "morning";
        else if (deg >= 135 && deg < 225) period = "night";
        else if (deg >= 225 && deg < 315) period = "evening";
        else period = "noon";

        if (period !== currentPeriod) {
            currentPeriod = period;
            updateUI(period);
        }
    });

    function updateUI(p) {
        const data = db[p];
        bg.style.background = data.bg;
        periodDisplay.innerText = data.periodName;

        pBox.classList.remove('active');
        setTimeout(() => {
            const randomPoem = data.poems[Math.floor(Math.random() * data.poems.length)];
            document.getElementById('p-title').innerText = "《" + randomPoem.t + "》";
            document.getElementById('p-text').innerHTML = randomPoem.c.replace("，", "，<br>");
            document.getElementById('p-author').innerText = randomPoem.a;
            
            // 色彩适配
            const isNight = (p === 'night');
            const mainColor = isNight ? '#e0f0f8' : '#1a1a1a';
            const subColor = isNight ? 'rgba(224,240,248,0.6)' : 'rgba(0,0,0,0.5)';
            
            periodDisplay.style.color = isNight ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)';
            document.getElementById('p-text').style.color = mainColor;
            document.getElementById('p-title').style.color = subColor;
            document.getElementById('p-author').style.color = subColor;
            document.getElementById('p-author').style.borderTopColor = isNight ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)';

            pBox.classList.add('active');
        }, 500);
    }

    updateUI("noon");
</script>

</body>
</html>
